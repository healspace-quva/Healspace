<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HealSpace - Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #030712; font-family: 'Outfit', sans-serif; }

        #app-wrapper { position: fixed; inset: 0; display: flex; justify-content: center; background-color: #030712; z-index: 9999; }
        #mobile-container { width: 100%; max-width: 448px; height: 100%; background-color: #0B0E14; display: flex; flex-direction: column; position: relative; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.9); }

        /* Ambient Glow Backgrounds */
        .ambient-glow { position: absolute; width: 300px; height: 300px; border-radius: 50%; filter: blur(90px); z-index: 1; pointer-events: none; animation: floatGlow 12s infinite alternate ease-in-out; opacity: 0.5; }
        .glow-1 { top: -50px; left: -50px; background-color: rgba(236, 72, 153, 0.3); }
        .glow-2 { bottom: -100px; right: -50px; background-color: rgba(168, 85, 247, 0.3); animation-delay: -6s; }
        @keyframes floatGlow { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(40px, 60px) scale(1.2); } }

        /* Screen Transitions */
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; background-color: transparent; transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.4s ease; z-index: 10; padding: 24px; overflow: hidden; }
        .screen-hidden-right { transform: translateX(100%); opacity: 0; pointer-events: none; }
        .screen-hidden-left { transform: translateX(-100%); opacity: 0; pointer-events: none; }
        .screen-active { transform: translateX(0); opacity: 1; z-index: 20; }

        /* Staggered Animations */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .screen-active h2 { animation: fadeUp 0.5s ease-out forwards; }
        .screen-active p { animation: fadeUp 0.5s ease-out 0.1s forwards; opacity: 0; }
        .screen-active .scroll-area { animation: fadeUp 0.5s ease-out 0.2s forwards; opacity: 0; }

        .scroll-area { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 120px; z-index: 10; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Bottom Fixed Navigation Buttons */
        .btn-container { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px; padding-bottom: 32px; background: linear-gradient(to top, #0b0e14 75%, transparent); z-index: 50; }
        .btn-bottom { width: 100%; background-color: white; color: black; font-weight: 800; font-size: 1.1rem; padding: 18px; border-radius: 9999px; text-align: center; transition: all 0.2s; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        .btn-bottom:active:not(:disabled) { transform: scale(0.96); opacity: 0.9; }
        .btn-bottom:disabled { opacity: 0.3; filter: grayscale(1); }

        /* Premium Input Fields */
        .input-premium { width: 100%; background-color: #1a1e29; border: 2px solid rgba(55, 65, 81, 0.5); border-radius: 18px; color: white; padding: 18px; font-size: 1rem; outline: none; transition: 0.3s; margin-bottom: 16px; }
        .input-premium:focus { border-color: #ec4899; background-color: #212635; box-shadow: 0 0 20px rgba(236,72,153,0.15); }

        /* Card Selections */
        .option-card { width: 100%; border: 2px solid #1f2937; background-color: rgba(31, 41, 55, 0.4); color: white; padding: 20px; border-radius: 22px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .option-card.selected { border-color: #ec4899; background-color: rgba(236, 72, 153, 0.1); transform: scale(1.02); }
        
        /* Gold Accent for All Access */
        .card-gold { border-color: #fbbf24 !important; background: linear-gradient(45deg, rgba(251,191,36,0.15), rgba(245,158,11,0.15)) !important; color: #fbbf24 !important; box-shadow: 0 0 20px rgba(251,191,36,0.1); }

        /* Clear Dark Ticks */
        .check-circle { width: 26px; height: 26px; border-radius: 50%; display: flex; items-center; justify-content: center; background-color: #ec4899; color: #000; font-size: 14px; font-weight: 900; opacity: 0; transform: scale(0.5); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .selected .check-circle { opacity: 1; transform: scale(1); }
        .card-gold .check-circle { background-color: #fbbf24; }
    </style>
</head>
<body>

    <div id="app-wrapper">
        <div id="mobile-container">
            <div class="ambient-glow glow-1"></div>
            <div class="ambient-glow glow-2"></div>

            <div id="screen-landing" class="screen screen-active justify-between">
                <div class="flex-1 flex flex-col items-center justify-center">
                    <div class="w-24 h-24 bg-gray-900 rounded-[2rem] flex items-center justify-center mb-8 shadow-[0_0_50px_rgba(236,72,153,0.3)] border border-gray-800">
                        <i class="fa-solid fa-leaf text-pink-500 text-5xl"></i>
                    </div>
                    <h1 class="text-white text-5xl font-black tracking-tighter mb-2">HealSpace.</h1>
                    <p class="text-gray-400 text-center text-sm px-6 leading-relaxed">A safe community to connect anonymously. <br>Your journey starts here.</p>
                </div>

                <div class="space-y-4 mb-10">
                    <button onclick="showScreen('screen-reg-role')" class="w-full bg-gradient-to-r from-pink-500 to-purple-600 text-white font-bold py-5 rounded-2xl shadow-xl active:scale-95 transition">Get Started</button>
                    <button onclick="showScreen('screen-login')" class="w-full bg-white/5 border border-white/10 text-white font-bold py-5 rounded-2xl active:scale-95 transition">Sign In</button>
                </div>
            </div>

            <div id="screen-login" class="screen screen-hidden-right">
                <button onclick="showScreen('screen-landing')" class="text-gray-400 text-2xl mb-8"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 class="text-white text-4xl font-bold mb-2">Welcome back</h2>
                <p class="text-gray-500 mb-8">Login to your anonymous space.</p>
                
                <div class="scroll-area mt-4">
                    <input type="email" id="loginEmail" placeholder="Email Address" class="input-premium" oninput="validateLogin()">
                    <input type="password" id="loginPass" placeholder="Password" class="input-premium" oninput="validateLogin()">
                </div>

                <div class="btn-container">
                    <button id="btnLogin" onclick="handleRedirect()" class="btn-bottom" disabled>Log In</button>
                </div>
            </div>

            <div id="screen-reg-role" class="screen screen-hidden-right">
                <button onclick="showScreen('screen-landing')" class="text-gray-400 text-2xl mb-8"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 class="text-white text-3xl font-bold mb-2">Select your role</h2>
                <p class="text-gray-500 mb-8">How do you want to participate?</p>

                <div class="scroll-area no-scrollbar">
                    <div class="role-card option-card" onclick="selectRole(this, 'seeker')">
                        <span>Need Motivation</span>
                        <div class="check-circle"><i class="fa-solid fa-check"></i></div>
                    </div>
                    <div class="role-card option-card" onclick="selectRole(this, 'motivator')">
                        <span>Motivator</span>
                        <div class="check-circle"><i class="fa-solid fa-check"></i></div>
                    </div>
                    <div class="role-card option-card card-gold" onclick="selectRole(this, 'all')">
                        <span>Access All Spaces ✨</span>
                        <div class="check-circle"><i class="fa-solid fa-check"></i></div>
                    </div>
                </div>

                <div class="btn-container">
                    <button id="btnRoleNext" onclick="showScreen('screen-q-name')" class="btn-bottom bg-gradient-to-r from-pink-500 to-purple-600 text-white" disabled>Next Step</button>
                </div>
            </div>

            <div id="screen-q-name" class="screen screen-hidden-right">
                <button onclick="showScreen('screen-reg-role')" class="text-gray-400 text-2xl mb-8"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 class="text-white text-3xl font-bold mb-2">Choose an alias</h2>
                <p class="text-gray-500 mb-8">This is your identity in the hub.</p>

                <div class="scroll-area">
                    <input type="text" id="regName" placeholder="e.g. StarDust" class="input-premium text-2xl font-bold text-center py-6" oninput="validateName()">
                </div>

                <div class="btn-container">
                    <button id="btnFinish" onclick="handleRedirect()" class="btn-bottom bg-gradient-to-r from-pink-500 to-purple-600 text-white" disabled>Complete Setup</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Redirect function to index.html
        function handleRedirect() {
            // Save data if needed before redirecting
            const nameInput = document.getElementById('regName')?.value;
            if(nameInput) {
                localStorage.setItem("healspace_alias", nameInput.trim());
            }
            // Clear navigation to index.html
            window.location.href = "index.html";
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('screen-active');
                s.classList.add('screen-hidden-right');
            });
            const target = document.getElementById(id);
            target.classList.remove('screen-hidden-right');
            target.classList.add('screen-active');
        }

        function validateLogin() {
            const e = document.getElementById('loginEmail').value;
            const p = document.getElementById('loginPass').value;
            document.getElementById('btnLogin').disabled = (e.length < 3 || p.length < 6);
        }

        function selectRole(el, role) {
            document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('btnRoleNext').disabled = false;
        }

        function validateName() {
            const n = document.getElementById('regName').value.trim();
            document.getElementById('btnFinish').disabled = (n.length < 2);
        }
    </script>
</body>
</html>
