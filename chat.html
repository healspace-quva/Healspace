<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HealSpace - Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
        
        /* Minimal Reset & Strict Mobile Lock */
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #030408; font-family: 'Outfit', sans-serif; touch-action: manipulation; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        #app-wrapper { position: fixed; inset: 0; display: flex; justify-content: center; z-index: 9999; background: #030408; }
        #mobile-container { width: 100%; max-width: 448px; height: 100%; background-color: #080a10; display: flex; flex-direction: column; position: relative; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,1); transition: background-color 0.5s ease; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Core Animations */
        @keyframes slideInRight { 0% { transform: translateX(100%); } 100% { transform: translateX(0); } }
        @keyframes slideOutRight { 0% { transform: translateX(0); } 100% { transform: translateX(100%); } }
        .screen-enter { animation: slideInRight 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .screen-exit { animation: slideOutRight 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.8) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .animate-fade { animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes slideInLeft { from { transform: translateX(-15px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .inbox-item-anim { animation: slideInLeft 0.3s ease-out forwards; opacity: 0; }

        @keyframes pulseBubble { 0% { transform: scale(1); } 50% { transform: scale(1.05); filter: brightness(1.2); } 100% { transform: scale(1); } }
        .pulse-anim { animation: pulseBubble 0.3s ease-out; }

        /* UI Elements */
        .insta-ring { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); padding: 2px; border-radius: 50%; }
        
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .skeleton-bg { background: linear-gradient(90deg, #111827 25%, #1f2937 50%, #111827 75%); background-size: 200% 100%; animation: shimmer 2s infinite linear; }

        #ptr-indicator { transition: height 0.2s ease, opacity 0.2s ease; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        @keyframes spinSlow { 100% { transform: rotate(360deg); } }
        .spin-slow { animation: spinSlow 1s linear infinite; }

        /* --- 6 PREMIUM THEME SYSTEM --- */
        .chat-bg { background-color: #080a10; transition: all 0.3s ease; }
        .chat-bubble-sent { background: #2563eb; color: white; border-radius: 18px 18px 4px 18px; align-self: flex-end; max-width: 78%; padding: 10px 14px; font-size: 0.95rem; word-wrap: break-word; position: relative; box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2); transition: transform 0.2s; }
        .chat-bubble-recv { background-color: #1f2937; color: #f3f4f6; border-radius: 18px 18px 18px 4px; align-self: flex-start; max-width: 78%; padding: 10px 14px; font-size: 0.95rem; word-wrap: break-word; position: relative; transition: transform 0.2s; }
        
        .theme-instagram .chat-bg { background-color: #000000; }
        .theme-instagram .chat-bubble-sent { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); box-shadow: 0 2px 10px rgba(220, 39, 67, 0.25); }
        .theme-instagram .chat-bubble-recv { background-color: #1c1c1e; border: 1px solid #333; }

        .theme-telegram .chat-bg { background-color: #0e1621; background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231f2937' fill-opacity='0.1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
        .theme-telegram .chat-bubble-sent { background: #2b5278; box-shadow: none; border-radius: 12px 12px 0px 12px; }
        .theme-telegram .chat-bubble-recv { background-color: #182533; border-radius: 12px 12px 12px 0px; }

        .theme-cyberpunk .chat-bg { background-color: #050510; }
        .theme-cyberpunk .chat-bubble-sent { background: transparent; border: 1px solid #00ffcc; color: #00ffcc; box-shadow: inset 0 0 10px rgba(0,255,204,0.2), 0 0 10px rgba(0,255,204,0.2); }
        .theme-cyberpunk .chat-bubble-recv { background-color: transparent; border: 1px solid #ff007f; color: #ff007f; box-shadow: inset 0 0 10px rgba(255,0,127,0.2); }

        .theme-midnight .chat-bg { background-color: #1a1a2e; }
        .theme-midnight .chat-bubble-sent { background: #4a4e69; border-radius: 20px; }
        .theme-midnight .chat-bubble-recv { background-color: #22223b; border-radius: 20px; }

        .theme-sakura .chat-bg { background-color: #1c1018; }
        .theme-sakura .chat-bubble-sent { background: #ff758f; color: white; box-shadow: 0 2px 15px rgba(255,117,143,0.3); }
        .theme-sakura .chat-bubble-recv { background-color: #2b1c24; color: #ffccd5; }

        /* Smart Grouping Styles */
        .chat-bubble-sent.grouped { border-top-right-radius: 4px; border-bottom-right-radius: 4px; margin-bottom: 2px !important; }
        .chat-bubble-recv.grouped { border-top-left-radius: 4px; border-bottom-left-radius: 4px; margin-bottom: 2px !important; }

        .bubble-active { transform: scale(0.97); filter: brightness(1.2); transition: 0.2s; z-index: 50; position: relative; }
        
        /* Sticky Date Badges */
        .date-badge { align-self: center; background: rgba(20, 20, 25, 0.6); backdrop-filter: blur(8px); color: #888; font-size: 0.75rem; font-weight: 600; padding: 6px 14px; border-radius: 12px; margin: 16px 0 8px 0; border: 1px solid rgba(255,255,255,0.05); text-transform: uppercase; letter-spacing: 1px; z-index: 5; position: sticky; top: 10px; }

        .vibe-note { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); background: #262626; border-radius: 12px; padding: 5px 10px; font-size: 0.7rem; color: white; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; border: 1px solid #3f3f46; max-width: 80px; overflow: hidden; text-overflow: ellipsis; }
        .vibe-note::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%) rotate(45deg); width: 8px; height: 8px; background: #262626; border-right: 1px solid #3f3f46; border-bottom: 1px solid #3f3f46; }

        textarea { resize: none; overflow-y: auto; transition: height 0.1s ease-out; }
        
        .reaction-btn { font-size: 1.8rem; transition: transform 0.2s; }
        .reaction-btn:active { transform: scale(1.3); }
        .reaction-badge { position: absolute; bottom: -8px; right: 4px; background: #2c2c2e; padding: 2px 6px; border-radius: 12px; font-size: 12px; border: 1px solid #4b5563; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 10; animation: popIn 0.2s ease-out forwards; cursor: pointer; transition: transform 0.2s; }
        .reaction-badge:hover { transform: scale(1.15); }
        .chat-bubble-recv .reaction-badge { right: auto; left: 4px; }
        
        /* Floating Chat Bar (Instagram Style) */
        .floating-chat-bar { background: rgba(22, 24, 30, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 10px 40px rgba(0,0,0,0.6); border-radius: 30px; }

        /* Dynamic Typing Dots */
        .typing-indicator span { display: inline-block; width: 5px; height: 5px; background-color: #9ca3af; border-radius: 50%; margin: 0 2px; animation: typingBounce 1.4s infinite ease-in-out both; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typingBounce { 0%, 80%, 100% { transform: scale(0); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }

        @keyframes floatUpAndFade { 0% { opacity: 1; transform: scale(0.5) translateY(0) rotate(-10deg); } 50% { transform: scale(1.5) translateY(-30px) rotate(10deg); } 100% { opacity: 0; transform: scale(1) translateY(-60px) rotate(-5deg); } }
        .floating-heart { position: fixed; font-size: 35px; pointer-events: none; z-index: 9999; animation: floatUpAndFade 0.9s ease-out forwards; filter: drop-shadow(0 4px 10px rgba(255,0,100,0.5)); }

        #scrollToBottomBtn { transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .status-icon { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        /* Swipe to Reply Animation */
        .swipe-reply-active { transform: translateX(40px) !important; opacity: 0.7; }
        
        /* Draggable Video */
        #localMediaContainer { cursor: grab; }
        #localMediaContainer:active { cursor: grabbing; }

        /* Calling Animation Rings */
        @keyframes pulseRing { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(2.2); opacity: 0; } }
        .call-ring { position: absolute; border: 2px solid #3b82f6; border-radius: 50%; width: 144px; height: 144px; animation: pulseRing 2s infinite cubic-bezier(0.215, 0.61, 0.355, 1); }
        .call-ring-2 { animation-delay: 1s; }
        
        /* Unsend Animation */
        @keyframes poofOut { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0); opacity: 0; margin-bottom: -40px; } }
        .msg-unsend { animation: poofOut 0.3s forwards cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        .mention-tag { color: #60a5fa; background: rgba(59,130,246,0.15); padding: 0 4px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app-wrapper">
        <div id="mobile-container">
            
            <div id="customNotification" class="hidden absolute top-4 left-3 right-3 z-[9999] bg-[#1c1c1e]/95 backdrop-blur-xl border border-blue-500/30 rounded-2xl p-4 shadow-2xl cursor-pointer hover:bg-gray-800 transition">
                <div class="flex items-start gap-3 pointer-events-none">
                    <div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center shrink-0">
                        <i id="notifIcon" class="fa-solid fa-comment-dots text-blue-400"></i>
                    </div>
                    <div class="flex-1">
                        <h4 id="notifTitle" class="text-white font-bold text-[13px]">New Message</h4>
                        <p id="notifMessage" class="text-gray-400 text-[11px] mt-0.5 truncate">Tap to view...</p>
                    </div>
                </div>
            </div>

            <div id="imageLightbox" class="fixed inset-0 z-[99999] bg-black/95 backdrop-blur-md hidden flex-col items-center justify-center opacity-0 transition-opacity duration-300" onclick="closeLightbox()">
                <div class="absolute top-12 right-6 w-10 h-10 bg-white/10 rounded-full flex items-center justify-center text-white text-xl cursor-pointer active:scale-90 transition">
                    <i class="fa-solid fa-xmark"></i>
                </div>
                <img id="lightboxImg" src="" class="max-w-[95vw] max-h-[80vh] object-contain rounded-2xl shadow-[0_0_50px_rgba(0,0,0,0.8)] transition-transform duration-300 scale-90" onclick="event.stopPropagation()">
            </div>

            <div id="miniProfileModal" class="absolute inset-0 z-[200] bg-black/70 backdrop-blur-md hidden flex-col justify-end opacity-0 transition-opacity duration-300" onclick="closeMiniProfile(event)">
                <div class="bg-[#11131a] w-full rounded-t-[32px] p-6 shadow-2xl transform translate-y-full transition-transform duration-300 pb-safe flex flex-col items-center border-t border-gray-800" id="miniProfileSheet" onclick="event.stopPropagation()">
                    <div class="w-10 h-1 bg-gray-700 rounded-full mb-6"></div>
                    <div class="w-20 h-20 rounded-full bg-gray-800 border border-gray-700 flex items-center justify-center text-3xl overflow-hidden shadow-lg mb-3" id="mpAvatar">👤</div>
                    <h2 class="text-white text-[22px] font-bold tracking-tight" id="mpName">Username</h2>
                    <p class="text-gray-400 text-[12px] font-medium mt-1 mb-5 bg-black/40 px-3 py-1 rounded-full border border-gray-800/50" id="mpVibe">Chilling right now ✨</p>
                    <button onclick="closeMiniProfile(true)" class="w-full bg-gray-800 hover:bg-gray-700 text-white font-bold text-[14px] py-3.5 rounded-xl active:scale-95 transition shadow-lg">
                        Close
                    </button>
                </div>
            </div>

            <div id="view-inbox" class="absolute inset-0 flex flex-col z-10 bg-[#080a10] overflow-hidden">
                <header class="pt-12 pb-2 px-4 flex justify-between items-center shrink-0 sticky top-0 bg-[#080a10]/90 backdrop-blur-xl z-20 border-b border-gray-800/40">
                    <div class="flex items-center gap-2.5">
                        <div class="w-10 h-10 rounded-full border-[1.5px] border-gray-600 overflow-hidden flex items-center justify-center bg-gray-800 shadow-sm" id="mainHeaderAvatarContainer"></div>
                        <div class="flex flex-col">
                            <h1 class="text-[20px] font-extrabold tracking-tight text-white flex items-center gap-1.5 leading-none">
                                Messages
                            </h1>
                            <span class="text-[10px] text-gray-500 font-bold tracking-wider uppercase mt-1">Your Inbox</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2.5">
                        <button onclick="openNewMessageScreen()" class="w-9 h-9 rounded-full bg-blue-600/20 flex items-center justify-center text-blue-400 hover:bg-blue-600/40 transition active:scale-90 border border-blue-500/30"><i class="fa-regular fa-pen-to-square text-[14px]"></i></button>
                    </div>
                </header>

                <main id="inboxMainArea" class="flex-1 w-full overflow-y-auto no-scrollbar pb-[100px] pt-2 relative px-2">
                    <div id="ptr-indicator" class="w-full h-0 flex items-center justify-center opacity-0 mb-1">
                        <i class="fa-solid fa-circle-notch text-blue-500 text-lg spin-slow"></i>
                    </div>

                    <div class="px-2 mb-4 mt-2">
                        <div class="bg-gray-900/80 rounded-xl px-3 py-2 flex items-center gap-2 border border-gray-700 focus-within:border-blue-500/50 transition-colors shadow-inner">
                            <i class="fa-solid fa-magnifying-glass text-gray-500 text-[12px]"></i>
                            <input type="text" id="userSearchInput" onkeyup="filterInbox()" placeholder="Search conversations" class="bg-transparent border-none outline-none text-white text-[13px] w-full placeholder-gray-500 font-medium">
                        </div>
                    </div>

                    <div class="flex gap-3 overflow-x-auto no-scrollbar px-2 mb-4 pb-2" id="vibesList"></div>

                    <div id="inboxList" class="flex flex-col pb-10 gap-0">
                        <div class="px-3 py-3 flex gap-3 animate-fade">
                            <div class="w-12 h-12 rounded-full skeleton-bg shrink-0"></div>
                            <div class="flex-1 py-1"><div class="h-3 skeleton-bg rounded w-1/2 mb-2"></div><div class="h-2 skeleton-bg rounded w-3/4"></div></div>
                        </div>
                        <div class="px-3 py-3 flex gap-3 animate-fade" style="animation-delay: 0.1s">
                            <div class="w-12 h-12 rounded-full skeleton-bg shrink-0"></div>
                            <div class="flex-1 py-1"><div class="h-3 skeleton-bg rounded w-1/3 mb-2"></div><div class="h-2 skeleton-bg rounded w-2/3"></div></div>
                        </div>
                    </div>
                </main>

                <nav id="mainNav" class="fixed bottom-5 left-1/2 -translate-x-1/2 w-[94%] max-w-[420px] bg-[#11131a]/90 backdrop-blur-xl rounded-[32px] border border-gray-800/50 h-[64px] z-30 shadow-[0_8px_24px_rgba(0,0,0,0.5)] transition-colors duration-400 pb-0">
                    <ul class="flex justify-between items-center h-full px-4">
                        <a href="index.html" class="flex flex-col items-center text-gray-500 hover:text-white transition-all p-2 active:scale-90"><i class="fa-solid fa-house text-[18px]"></i></a>
                        <a href="explore.html" class="flex flex-col items-center text-gray-500 hover:text-white transition-all p-2 active:scale-90"><i class="fa-solid fa-compass text-[18px]"></i></a>
                        <a href="community.html" class="flex flex-col items-center text-gray-500 hover:text-white transition-all p-2 active:scale-90"><i class="fa-solid fa-user-group text-[18px]"></i></a>
                        <a href="chat.html" class="flex items-center gap-1.5 bg-[#1a1c23] text-pink-500 px-3 py-2 rounded-full transition-all shadow-sm border border-pink-500/10">
                            <i class="fa-solid fa-message text-[16px]"></i>
                            <span class="font-normal text-[13px] tracking-widest" style="font-family: 'Metal Mania', cursive; margin-top: 1px;">Chat</span>
                            <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-pink-500 rounded-full border border-[#0B0E14] hidden" id="navChatDot"></span>
                        </a>
                        <a href="profile.html" class="flex flex-col items-center text-gray-500 hover:text-white transition-all p-2 active:scale-90"><i class="fa-solid fa-circle-user text-[18px]"></i></a>
                    </ul>
                </nav>
            </div>

            <div id="userOptionsOverlay" class="absolute inset-0 z-[80] bg-black/60 backdrop-blur-sm hidden flex-col justify-end opacity-0 transition-opacity duration-300" onclick="hideUserOptions()">
                <div class="bg-[#1c1c1e] w-full rounded-t-[32px] pb-safe shadow-2xl transform translate-y-full transition-transform duration-300 flex flex-col border-t border-gray-800" id="userOptionsSheet" onclick="event.stopPropagation()">
                    <div class="flex justify-center pt-4 pb-2"><div class="w-10 h-1 bg-gray-600 rounded-full"></div></div>
                    <div class="px-6 py-4 border-b border-gray-800/50 flex items-center gap-3">
                        <span id="optionsUserName" class="text-white font-bold text-[18px]" style="font-family: monospace;">Username</span>
                    </div>
                    <div class="flex flex-col text-white pb-6 pt-2">
                        <button class="flex items-center gap-4 px-6 py-3.5 hover:bg-[#2c2c2e] transition text-[14px] font-medium text-left active:bg-[#3a3a3c]"><i class="fa-regular fa-clock text-lg w-6 text-center text-gray-400"></i> Set reminder</button>
                        <button class="flex items-center gap-4 px-6 py-3.5 hover:bg-[#2c2c2e] transition text-[14px] font-medium text-left active:bg-[#3a3a3c]"><i class="fa-regular fa-envelope text-lg w-6 text-center text-gray-400"></i> Mark as Unread</button>
                        <button class="flex items-center gap-4 px-6 py-3.5 hover:bg-[#2c2c2e] transition text-[14px] font-medium text-left active:bg-[#3a3a3c]"><i class="fa-solid fa-thumbtack text-lg w-6 text-center text-gray-400"></i> Pin</button>
                        <button class="flex items-center gap-4 px-6 py-3.5 hover:bg-[#2c2c2e] transition text-[14px] font-medium text-left text-red-500 active:bg-[#3a3a3c]" onclick="deleteConversation()"><i class="fa-regular fa-trash-can text-lg w-6 text-center"></i> Delete Chat</button>
                    </div>
                </div>
            </div>

            <div id="view-chat" class="absolute inset-0 flex flex-col z-[60] bg-[#080a10] hidden">
                <header class="pt-12 pb-2 px-3 flex justify-between items-center border-b border-white/5 shrink-0 bg-[#080a10]/90 backdrop-blur-xl z-20 shadow-sm">
                    <div class="flex items-center gap-1.5">
                        <button onclick="closeChat()" class="text-white hover:text-gray-300 transition active:scale-90 p-2"><i class="fa-solid fa-arrow-left text-[18px]"></i></button>
                        <div class="flex items-center gap-2.5 cursor-pointer" onclick="openChatMiniProfile()">
                            <div class="w-9 h-9 rounded-full overflow-hidden relative bg-gray-800" id="chatTargetAvatarContainer"></div>
                            <div class="flex flex-col justify-center">
                                <h3 class="text-white font-bold text-[15px] leading-tight tracking-wide" id="chatTargetName">User</h3>
                                <p class="text-[10px] text-gray-500 font-medium transition-all mt-0.5" id="chatTargetStatus">Connecting...</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 text-white pr-2">
                        <button class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-white/10 transition active:scale-90" onclick="openThemeSelector()"><i class="fa-solid fa-palette text-[15px]"></i></button>
                        <button class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-white/10 transition active:scale-90" onclick="startCall('audio')"><i class="fa-solid fa-phone text-[15px]"></i></button>
                        <button class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-white/10 transition active:scale-90" onclick="startCall('video')"><i class="fa-solid fa-video text-[16px]"></i></button>
                    </div>
                </header>

                <main id="chatMessageArea" class="chat-bg flex-1 overflow-y-auto no-scrollbar p-3 flex flex-col gap-[6px] pb-24 relative"></main>

                <button id="scrollToBottomBtn" onclick="scrollToBottom()" class="absolute bottom-[90px] right-4 w-9 h-9 bg-[#1c1c1e]/90 backdrop-blur-md border border-gray-700 rounded-full flex items-center justify-center text-white shadow-xl transform translate-y-20 opacity-0 z-30 active:scale-90">
                    <i class="fa-solid fa-chevron-down text-[11px]"></i>
                </button>

                <div class="fixed bottom-0 left-0 w-full px-3 pb-safe pt-2 bg-gradient-to-t from-[#080a10] via-[#080a10]/80 to-transparent z-50 pointer-events-none">
                    
                    <div id="replyPreviewContainer" class="hidden absolute -top-[30px] left-8 right-8 bg-[#1c1c1e]/95 backdrop-blur-md border-l-[3px] border-blue-500 rounded-t-xl px-3 py-1.5 flex justify-between items-center shadow-lg z-[-1] pointer-events-auto">
                        <div class="flex flex-col overflow-hidden w-full"><span class="text-blue-400 text-[9px] font-bold uppercase tracking-wider">Replying to</span><span id="replyPreviewText" class="text-gray-300 text-[11px] truncate"></span></div>
                        <button onclick="cancelReply()" class="text-gray-400 hover:text-white p-1 ml-2 active:scale-90"><i class="fa-solid fa-xmark text-xs"></i></button>
                    </div>

                    <div class="floating-chat-bar flex items-end px-1.5 py-1.5 pointer-events-auto mb-2 relative transition-all" id="mainChatBar">
                        
                        <button class="w-10 h-10 rounded-full flex shrink-0 items-center justify-center text-gray-400 hover:text-white transition active:scale-90 mb-0.5" onclick="document.getElementById('fileUpload').click()">

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzu8wRTBfPp6_zITGbtENbYR6J5OclmdLIbjQfwVvzueMGad5ny87hkpibxmMdJUbm1/exec";
        const myAlias = localStorage.getItem("healspace_alias") || "DemoUser_" + Math.floor(Math.random()*1000);
        let loggedInRole = localStorage.getItem("healspace_logged_role") || "seeker";
        
        // --- CORE HARDWARE LOGIC ---
        function hapticFeedback(pattern = 15) { if (navigator.vibrate) navigator.vibrate(pattern); }
        
        function requestNotificationPermission() {
            if ("Notification" in window && Notification.permission === "default") { Notification.requestPermission(); }
        }
        
        function triggerBrowserNotification(title, body) {
            if ("Notification" in window && Notification.permission === "granted" && document.visibilityState !== "visible") {
                new Notification(title, { body: body, icon: "https://cdn-icons-png.flaticon.com/512/3114/3114491.png" });
            }
        }

        window.addEventListener('popstate', function(event) {
            if (activeChatUser) { closeChatUIOnly(); }
        });

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.getElementById('mobile-container').style.height = window.visualViewport.height + 'px';
                if (activeChatUser && document.activeElement.tagName === 'TEXTAREA') {
                    setTimeout(scrollToBottom, 50);
                }
            });
        }
        
        function safeParseJSON(str, fallback) { 
            if (!str || str === "undefined" || str === "null" || str === "[object Object]") return fallback;
            try { return JSON.parse(str) || fallback; } catch(e) { return fallback; } 
        }

        let savedAccounts = safeParseJSON(localStorage.getItem('healspace_saved_accounts'), {});
        if (!savedAccounts || !savedAccounts[loggedInRole]) savedAccounts[loggedInRole] = { alias: myAlias, emoji: '✨' };

        let activeChatUser = null, selectedMessageId = null, selectedMessageType = null, chatPressTimer, typingTimeout, activeStatusInterval, activeStatusTimeout, globalPeer, allNetworkUsers = [], onlineStatuses = {}, forwardPendingMsg = null, replyingToText = null, isSecretChat = false, lastHistoryHash = "";
        let selectedUserForOptions = null; 
        
        let currentCall = null, localStream = null, incomingCallObj = null, incomingCallIsVideo = false, isAudioMuted = false, isVideoMuted = false, usingFrontCamera = true, callTimerInterval, callStartTime;

        // Voice Message Vars
        let mediaRecorder; let audioChunks = []; let isRecording = false; let recordStartTime; let recordTimerInterval; let cancelRecordFlag = false;

        const allEmojis = ["😀","😂","😅","😍","🥰","😘","🥲","😋","😛","😜","🤪","😝","🤑","🤗","🤭","🤫","🤔","🤐","🤨","😐","😑","😶","😏","😒","🙄","😬","🤥","😌","😔","😪","🤤","😴","😷","🤒","🤕","🤢","🤮","🤧","🥵","🥶","🥴","😵","🤯","🤠","🥳","🥸","😎","🤓","🧐","😕","😟","🙁","☹️","😮","😯","😲","😳","🥺","😦","😧","😨","😰","😥","😢","😭","😱","😖","😣","😞","😓","😩","😫","🥱","😤","😡","😠","🤬","😈","👿","💀","☠️","💩","🤡","👹","👺","👻","👽","👾","🤖","💯","💢","💥","💫","💦","💨","💣","💬","💭","💤"];

        function getChatHistory(alias) { return safeParseJSON(localStorage.getItem(`hs_chat_${myAlias}_${alias}`), []); }
        function saveChatHistory(alias, history) { localStorage.setItem(`hs_chat_${myAlias}_${alias}`, JSON.stringify(history)); }
        function getInteractedUsers() { return safeParseJSON(localStorage.getItem(`hs_interacted_${myAlias}`), []); }
        function addToInteractedUsers(alias) { if (isSecretChat) return; let interacted = getInteractedUsers(); if (!interacted.includes(alias) && alias !== myAlias) { interacted.push(alias); localStorage.setItem(`hs_interacted_${myAlias}`, JSON.stringify(interacted)); } }

        // --- INITIALIZATION ---
        document.addEventListener("DOMContentLoaded", () => {
            document.body.addEventListener('click', requestNotificationPermission, { once: true });
            
            document.getElementById('inboxUserIdText').innerText = savedAccounts[loggedInRole]?.alias || 'User';
            document.getElementById('mainHeaderAvatarContainer').innerHTML = getInnerAvatarHTML(myAlias);
            initEmojiPicker();
            loadChatTheme(); 
            setupDraggableVideo();

            const chatInput = document.getElementById('chatInput');
            const micBtn = document.getElementById('micBtn');
            const sendBtn = document.getElementById('sendBtn');
            let resizeTimeout;

            chatInput.addEventListener('input', function() {
                cancelAnimationFrame(resizeTimeout);
                resizeTimeout = requestAnimationFrame(() => {
                    this.style.height = 'auto'; this.style.height = (this.scrollHeight < 100 ? this.scrollHeight : 100) + 'px';
                    if(this.value.trim().length > 0) {
                        micBtn.classList.add('hidden');
                        sendBtn.classList.remove('hidden');
                    } else {
                        micBtn.classList.remove('hidden');
                        sendBtn.classList.add('hidden');
                    }
                });
                try {
                    if (activeChatUser && globalPeer && !globalPeer.destroyed && globalPeer.open) {
                        const targetPeerId = "hs_" + activeChatUser.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
                        const conn = globalPeer.connect(targetPeerId, { reliable: true });
                        conn.on('open', () => { conn.send({ action: 'typing', sender: myAlias }); });
                        clearTimeout(typingTimeout);
                        typingTimeout = setTimeout(() => { const connStop = globalPeer.connect(targetPeerId, { reliable: true }); connStop.on('open', () => { connStop.send({ action: 'stop_typing', sender: myAlias }); }); }, 1500);
                    }
                } catch(e) {}
            });
            chatInput.addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if(this.value.trim()) processSendText(); } });

            const msgArea = document.getElementById('chatMessageArea');
            msgArea.addEventListener('scroll', () => {
                const fab = document.getElementById('scrollToBottomBtn');
                if (msgArea.scrollHeight - msgArea.scrollTop > msgArea.clientHeight + 150) fab.classList.remove('translate-y-20', 'opacity-0');
                else fab.classList.add('translate-y-20', 'opacity-0');
            });

            initPullToRefresh();
            initGlobalCore(); syncBackendHistory(); fetchAllNetworkUsers(); checkUrlForDirectChat(); renderVibesTray();
            
            setInterval(async () => {
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=get_users`); const data = await response.json();
                    if (Array.isArray(data)) {
                        allNetworkUsers = data.filter(u => u.alias && u.alias !== myAlias);
                        if(activeChatUser) {
                            const remoteUser = allNetworkUsers.find(u => u.alias === activeChatUser);
                            if (remoteUser && remoteUser.isOnline) {
                                const statusEl = document.getElementById('chatTargetStatus');
                                if (statusEl && !statusEl.innerHTML.includes("typing-indicator")) { statusEl.innerText = "Active now"; statusEl.className = "text-[10px] text-gray-300 font-medium transition-all mt-0.5"; }
                            }
                        }
                        renderInbox(false); 
                    }
                } catch(e) {}
            }, 15000);
        });

        // --- PULL TO REFRESH ENGINE ---
        function initPullToRefresh() {
            const scrollArea = document.getElementById('inboxMainArea');
            const ptrIndicator = document.getElementById('ptr-indicator');
            let startY = 0; let isPulling = false;

            scrollArea.addEventListener('touchstart', e => {
                if (scrollArea.scrollTop === 0) { startY = e.touches[0].clientY; isPulling = true; }
            }, {passive: true});

            scrollArea.addEventListener('touchmove', e => {
                if (!isPulling) return;
                let diff = e.touches[0].clientY - startY;
                if (diff > 0 && scrollArea.scrollTop === 0) {
                    let height = Math.min(diff * 0.3, 40); 
                    ptrIndicator.style.height = height + 'px';
                    ptrIndicator.style.opacity = height / 40;
                }
            }, {passive: true});

            scrollArea.addEventListener('touchend', e => {
                if (!isPulling) return;
                isPulling = false;
                if (parseInt(ptrIndicator.style.height) >= 35) {
                    hapticFeedback(15);
                    ptrIndicator.style.height = '35px';
                    ptrIndicator.style.opacity = '1';
                    refreshInboxAnim();
                    setTimeout(() => { ptrIndicator.style.height = '0px'; ptrIndicator.style.opacity = '0'; }, 800);
                } else {
                    ptrIndicator.style.height = '0px';
                    ptrIndicator.style.opacity = '0';
                }
            });
        }
        
        function refreshInboxAnim() {
            hapticFeedback();
            const btn = document.getElementById('btnRefresh');
            btn.classList.add('animate-spin');
            syncBackendHistory();
            fetchAllNetworkUsers();
            setTimeout(() => btn.classList.remove('animate-spin'), 1000);
        }

        // Draggable Video UI (PiP)
        function setupDraggableVideo() {
            const el = document.getElementById('localMediaContainer');
            let isDragging = false, startX, startY, initialX, initialY;
            
            el.addEventListener('touchstart', (e) => {
                isDragging = true;
                startX = e.touches[0].clientX; startY = e.touches[0].clientY;
                initialX = el.offsetLeft; initialY = el.offsetTop;
            });
            document.addEventListener('touchmove', (e) => {
                if(!isDragging) return;
                e.preventDefault(); 
                const dx = e.touches[0].clientX - startX;
                const dy = e.touches[0].clientY - startY;
                el.style.left = `${initialX + dx}px`;
                el.style.top = `${initialY + dy}px`;
                el.style.right = 'auto'; 
            }, {passive: false});
            document.addEventListener('touchend', () => isDragging = false);
        }

        // THEME CONTROLLER
        function loadChatTheme() {
            const savedTheme = localStorage.getItem('hs_chat_theme') || 'default';
            document.getElementById('view-chat').className = `absolute inset-0 flex flex-col z-[60] hidden theme-${savedTheme}`;
        }
        function openThemeSelector() {
            hapticFeedback();
            document.getElementById('themeModal').classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('themeModal').firstElementChild.classList.remove('translate-y-full');
        }
        function closeThemeSelector() {
            document.getElementById('themeModal').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('themeModal').firstElementChild.classList.add('translate-y-full');
        }
        function applyTheme(themeName) {
            hapticFeedback(20);
            localStorage.setItem('hs_chat_theme', themeName);
            loadChatTheme();
            document.getElementById('view-chat').classList.remove('hidden'); 
            closeThemeSelector();
        }

        // FULLSCREEN LIGHTBOX

        function initGlobalCore() {
            if (!myAlias || myAlias === "User" || myAlias === "Anonymous") return;
            setInterval(async () => {
                try {
                    const res = await fetch(SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: 'sync_core', user: myAlias }) });
                    const data = await res.json();
                    if (data.messages && data.messages.length > 0) data.messages.forEach(m => processIncomingMessage(m.sender, safeParseJSON(m.msgData, {}), false));
                } catch(e) {}
            }, 5000); 

            try {
                globalPeer = new Peer("hs_" + myAlias.replace(/[^a-zA-Z0-9]/g, '').toLowerCase());
                globalPeer.on('disconnected', () => { globalPeer.reconnect(); });
                globalPeer.on('connection', (conn) => {
                    conn.on('data', (data) => {
                        onlineStatuses[data.sender] = Date.now();
                        if (data.action === 'chat_sync') processIncomingMessage(data.sender, data.msgData, data.isSecret);
                        else if (data.action === 'call_declined') { if (currentCall) { document.getElementById('callStatusText').innerText = "Call Declined"; document.getElementById('callStatusText').className = "text-white font-bold bg-red-500 px-4 py-1.5 rounded-full inline-block shadow-lg z-10"; setTimeout(endCall, 2000); } }
                        else if (data.action === 'ping') {
                            if (activeChatUser === data.sender) { const statusEl = document.getElementById('chatTargetStatus'); if(statusEl && statusEl.innerText !== "Typing...") { statusEl.innerText = "Active now"; statusEl.className = "text-[10px] text-gray-300 font-medium transition-all"; } }
                            try { const pongConn = globalPeer.connect("hs_" + data.sender.replace(/[^a-zA-Z0-9]/g, '').toLowerCase(), { reliable: true }); pongConn.on('open', () => { pongConn.send({ action: 'pong', sender: myAlias }); }); } catch(e) {}
                        }
                        else if (data.action === 'pong') { if (activeChatUser === data.sender) { clearTimeout(activeStatusTimeout); const statusEl = document.getElementById('chatTargetStatus'); if(statusEl && statusEl.innerText !== "Typing...") { statusEl.innerText = "Active now"; statusEl.className = "text-[10px] text-gray-300 font-medium transition-all"; } } }
                        else if (data.action === 'reaction') {
                            if (!isSecretChat) { let history = getChatHistory(data.sender); const index = history.findIndex(m => m.id === data.msgId); if (index > -1) { if(data.reaction===''){delete history[index].reaction;}else{history[index].reaction = data.reaction;} saveChatHistory(data.sender, history); if (activeChatUser === data.sender) renderChatMessages(); } } 
                        } 
                        else if (data.action === 'delivered' || data.action === 'read') {
                            if (!isSecretChat) {
                                let history = getChatHistory(data.sender);
                                if (data.action === 'read') history.forEach(m => { if (m.type === 'sent') m.status = 'read'; });
                                else if (data.action === 'delivered' && data.msgId) { const index = history.findIndex(m => m.id === data.msgId); if (index > -1 && history[index].status !== 'read') history[index].status = 'delivered'; }
                                saveChatHistory(data.sender, history); if (activeChatUser === data.sender) renderChatMessages();
                            }
                        } 
                        else if (data.action === 'typing') { if (activeChatUser === data.sender) { const statusEl = document.getElementById('chatTargetStatus'); statusEl.innerText = "Typing..."; statusEl.className = "text-[10px] text-blue-400 font-bold transition-all animate-pulse"; showTypingBubble(); } } 
                        else if (data.action === 'stop_typing') { if (activeChatUser === data.sender) { const statusEl = document.getElementById('chatTargetStatus'); statusEl.innerText = "Active now"; statusEl.className = "text-[10px] text-gray-300 font-medium transition-all"; hideTypingBubble(); } } 
                        else if (data.action === 'unsend') {
                            if (!isSecretChat) { let history = getChatHistory(data.sender); const index = history.findIndex(m => m.id === data.msgId); if (index > -1) { history[index].deleted = true; saveChatHistory(data.sender, history); } renderInbox(false); }
                            if (activeChatUser === data.sender) { const msgEl = document.getElementById(`msg-${data.msgId}`); if (msgEl) { msgEl.classList.add('msg-unsend'); setTimeout(()=>msgEl.remove(),300); } }
                        }
                        if(!activeChatUser) renderInbox(false);
                    });
                });

                // Call handling
                globalPeer.on('call', (call) => {
                    incomingCallObj = call; incomingCallIsVideo = call.metadata ? call.metadata.type === 'video' : false;
                    const caller = call.peer.replace('hs_','');
                    document.getElementById('incomingCallerName').innerText = caller;
                    document.getElementById('incomingCallType').innerText = incomingCallIsVideo ? "Incoming Video Call..." : "Incoming Audio Call...";
                    document.getElementById('incomingCallAvatar').innerHTML = getInnerAvatarHTML(caller);
                    document.getElementById('incomingCallPopup').classList.remove('-translate-y-[150%]');
                    triggerBrowserNotification(`Incoming Call`, `Call from ${caller}`);
                    try { document.getElementById('sndRingtone').play().catch(()=>{}); } catch(e){}
                    call.on('close', () => { hideIncomingCallPopup(); endCall(); });
                });
            } catch(error) { console.log("PeerJS fallback handled"); }
        }

        async function syncBackendHistory() {
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: 'get_chat_history', user: myAlias }) });
                const data = await res.json();
                if (data.status === "success" && data.history) {
                    const newHash = JSON.stringify(data.history);
                    if (newHash !== lastHistoryHash) {
                        lastHistoryHash = newHash;
                        data.history.forEach(row => {
                            let partner = row.sender === myAlias ? row.receiver : row.sender;
                            let localHistory = getChatHistory(partner);
                            let msgObj = safeParseJSON(row.msgData, null);
                            if(!msgObj) return;
                            msgObj.type = row.sender === myAlias ? 'sent' : 'recv';
                            if (!localHistory.find(m => m.id === msgObj.id)) { localHistory.push(msgObj); localHistory.sort((a,b) => parseInt(a.id) - parseInt(b.id)); saveChatHistory(partner, localHistory); addToInteractedUsers(partner); }
                        });
                        renderInbox(true); if (activeChatUser) renderChatMessages();
                    }
                }
            } catch(e) {}
        }

        function processIncomingMessage(sender, msgData, isSecret) {
            if(!msgData || !msgData.id) return;
            let history = getChatHistory(sender); if (history.find(m => m.id === msgData.id)) return;
            msgData.type = 'recv'; msgData.read = false; 
            if (msgData.file && (msgData.file.data instanceof Blob || msgData.file.data instanceof ArrayBuffer)) { const blob = msgData.file.data instanceof Blob ? msgData.file.data : new Blob([msgData.file.data], { type: msgData.file.type }); msgData.file.data = URL.createObjectURL(blob); }
            if (!isSecret) { let historyMsg = JSON.parse(JSON.stringify(msgData)); if (historyMsg.file) historyMsg.file.data = null; history.push(historyMsg); history.sort((a,b) => parseInt(a.id) - parseInt(b.id)); saveChatHistory(sender, history); addToInteractedUsers(sender); }
            
            if (activeChatUser === sender && (!isSecret || isSecretChat)) {
                hideTypingBubble();
                
                const isGrouped = history.length > 1 && history[history.length-2].type === 'recv';
                appendMessageToDOM(msgData, true, isGrouped);
                
                if(!isSecret) { history = getChatHistory(sender); let found = history.find(m => m.id === msgData.id); if(found) found.read = true; saveChatHistory(sender, history); }
                try { if(globalPeer && !globalPeer.destroyed && globalPeer.open) { const receiptConn = globalPeer.connect("hs_" + sender.replace(/[^a-zA-Z0-9]/g, '').toLowerCase(), { reliable: true }); receiptConn.on('open', () => { receiptConn.send({ action: 'read', sender: myAlias, msgId: msgData.id }); }); } } catch(e) {}
            } else {
                showGlobalNotification(sender, msgData.text ? msgData.text : "Attachment", false); 
                triggerBrowserNotification(sender, msgData.text ? msgData.text : "Sent an attachment");
                renderInbox(true); 
                try { if(globalPeer && !globalPeer.destroyed && globalPeer.open && !isSecret) { const receiptConn = globalPeer.connect("hs_" + sender.replace(/[^a-zA-Z0-9]/g, '').toLowerCase(), { reliable: true }); receiptConn.on('open', () => { receiptConn.send({ action: 'delivered', sender: myAlias, msgId: msgData.id }); }); } } catch(e) {}
            }
            try { document.getElementById('sndPop').play().catch(()=>{}); } catch(e){}
        }

        function renderInbox(force = false) {
            const container = document.getElementById('inboxList'); if(!container) return;
            let htmlBuffer = ''; const interactedList = getInteractedUsers(); const searchQ = document.getElementById('userSearchInput')?.value.toLowerCase() || "";
            let filtered = interactedList.filter(u => u.toLowerCase().includes(searchQ));
            filtered.sort((a, b) => { let histA = getChatHistory(a); let histB = getChatHistory(b); return (histB.length > 0 ? parseInt(histB[histB.length-1].id) : 0) - (histA.length > 0 ? parseInt(histA[histA.length-1].id) : 0); });

            if(filtered.length === 0) { container.innerHTML = `<div class="flex flex-col items-center justify-center mt-12 opacity-60"><i class="fa-regular fa-comments text-4xl text-gray-700 mb-3"></i><p class="text-center text-gray-600 text-[11px]">No conversations yet.</p></div>`; return; }

            filtered.forEach((userAlias, index) => {
                const validHistory = getChatHistory(userAlias).filter(m => !m.deleted);
                const lastMsg = validHistory.length > 0 ? validHistory[validHistory.length-1] : null;
                let previewText = "Sent a message", timeText = "", tickIcon = "";
                const isUnread = lastMsg && lastMsg.type === 'recv' && lastMsg.read === false;

                if (lastMsg) {
                    if (lastMsg.file) {
                        previewText = lastMsg.file.type.startsWith('audio/') ? "Sent a voice message 🎤" : "Sent an attachment 📁";
                    } else {
                        previewText = lastMsg.text ? lastMsg.text.substring(0, 30) + (lastMsg.text.length > 30 ? "..." : "") : "Media";
                    }
                    if (lastMsg.id) { 
                        const d = new Date(parseInt(lastMsg.id));
                        const now = new Date();
                        if (d.toDateString() === now.toDateString()) {
                            timeText = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        } else {
                            timeText = d.toLocaleDateString([], { month: 'short', day: 'numeric' });
                        }
                    }
                    if (lastMsg.type === 'sent') { if (lastMsg.status === 'read') tickIcon = `<i class="fa-solid fa-check-double text-blue-500 text-[10px] mr-1"></i>`; else if (lastMsg.status === 'delivered') tickIcon = `<i class="fa-solid fa-check-double text-gray-500 text-[10px] mr-1"></i>`; else tickIcon = `<i class="fa-solid fa-check text-gray-500 text-[10px] mr-1"></i>`; }
                }

                let isOnline = false;
                if (onlineStatuses[userAlias] && (Date.now() - onlineStatuses[userAlias] < 90000)) isOnline = true;
                else if (allNetworkUsers) { const rUser = allNetworkUsers.find(u => u.alias === userAlias); if (rUser && rUser.isOnline) isOnline = true; }
                
                let delay = index * 0.05;
                
                htmlBuffer += `
                <div class="flex items-center gap-3 px-3 py-2.5 cursor-pointer group inbox-item-anim active:bg-white/5 transition active:scale-95" style="animation-delay: ${delay}s" onclick="openChat('${userAlias}')" oncontextmenu="event.preventDefault(); showUserOptions('${userAlias}')">
                    <div class="w-[46px] h-[46px] rounded-full relative p-[2px] ${isOnline ? 'insta-ring' : ''} transition-colors flex items-center justify-center shrink-0 shadow-sm">
                        <div class="w-full h-full rounded-full bg-gray-800 overflow-hidden flex items-center justify-center">${getInnerAvatarHTML(userAlias)}</div>
                    </div>
                    <div class="flex-1 overflow-hidden pr-1 border-b border-gray-800/40 group-hover:border-transparent pb-1 pt-0.5">
                        <div class="flex justify-between items-center mb-0.5">
                            <h3 class="text-[14px] ${isUnread ? 'text-white font-bold' : 'text-gray-200 font-medium'} truncate">${userAlias}</h3>
                            <span class="text-[10px] text-gray-500">${timeText}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <p class="${isUnread ? 'text-white font-medium' : 'text-gray-500 font-light'} text-[12px] truncate flex items-center">${tickIcon}${previewText}</p>
                            ${isUnread ? '<div class="w-1.5 h-1.5 bg-blue-500 rounded-full shrink-0 shadow-[0_0_5px_rgba(59,130,246,0.8)]"></div>' : ''}
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = htmlBuffer;
            
            setTimeout(() => {
                const items = container.querySelectorAll('.inbox-item-anim');
                items.forEach(item => {
                    let pressTimer; let startX;
                    item.addEventListener('touchstart', (e) => {
                        startX = e.touches[0].clientX;
                        pressTimer = setTimeout(() => { e.preventDefault(); item.oncontextmenu(); }, 500);
                    }, {passive:true});
                    item.addEventListener('touchmove', (e) => {
                        let diff = e.touches[0].clientX - startX;
                        if(Math.abs(diff) > 10) clearTimeout(pressTimer); 
                    }, {passive:true});
                    item.addEventListener('touchend', () => clearTimeout(pressTimer));
                });
            }, 100);
        }

                const targetPeerId = "hs_" + activeChatUser.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
                try { const conn = globalPeer.connect(targetPeerId, { reliable: true }); conn.on('open', () => { conn.send({ action: 'ping', sender: myAlias }); }); } catch(e){}
                clearTimeout(activeStatusTimeout);
                activeStatusTimeout = setTimeout(() => {
                    const remoteUser = allNetworkUsers.find(u => u.alias === activeChatUser); if (remoteUser && remoteUser.isOnline) return; 
                    const statusEl = document.getElementById('chatTargetStatus'); if(statusEl && !statusEl.innerHTML.includes("typing-indicator")) { statusEl.innerText = "Offline"; statusEl.className = "text-[10px] text-gray-500 font-medium transition-all mt-0.5"; }
                }, 8000); 
            }
        }

        function openChat(name, secret = false) {
            hapticFeedback();
            activeChatUser = name; isSecretChat = secret; document.getElementById('chatTargetName').innerText = name + (secret ? ' 👻' : ''); cancelReply(); 
            document.getElementById('chatTargetAvatarContainer').innerHTML = getInnerAvatarHTML(name);
            const statusEl = document.getElementById('chatTargetStatus'); statusEl.innerText = "Connecting..."; statusEl.className = "text-[10px] text-gray-500 font-medium transition-all mt-0.5";
            if (allNetworkUsers) { const remoteUser = allNetworkUsers.find(u => u.alias === name); if (remoteUser && remoteUser.isOnline) { statusEl.innerText = "Active now"; statusEl.className = "text-[10px] text-gray-300 font-medium transition-all mt-0.5"; } }
            
            // Hardware back button state
            history.pushState({chatOpen: true}, "Chat", "?chatWith=" + encodeURIComponent(name));

            if (!isSecretChat) { let history = getChatHistory(activeChatUser); let changed = false; history.forEach(m => { if(m.type === 'recv' && !m.read) { m.read = true; changed = true; } }); if (changed) saveChatHistory(activeChatUser, history); renderChatMessages(); } else { document.getElementById('chatMessageArea').innerHTML = `<div class="date-badge">Secret Chat Started</div>`; }
            const viewChat = document.getElementById('view-chat'); viewChat.classList.remove('hidden', 'screen-exit'); viewChat.classList.add('screen-enter');
            if (globalPeer && !globalPeer.destroyed) {
                const targetPeerId = "hs_" + activeChatUser.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
                try { const conn = globalPeer.connect(targetPeerId, { reliable: true }); conn.on('open', () => { conn.send({ action: 'read', sender: myAlias }); }); } catch(e) {}
                checkActiveStatus(); clearInterval(activeStatusInterval); activeStatusInterval = setInterval(checkActiveStatus, 60000); 
            }
            if (!isSecretChat) renderInbox(true);
        }

        function closeChat() {
            if(history.state && history.state.chatOpen) { history.back(); } 
            else { closeChatUIOnly(); }
        }

        function closeChatUIOnly() { 
            hapticFeedback(10); 
            activeChatUser = null; isSecretChat = false; clearInterval(activeStatusInterval); 
            document.getElementById('view-chat').classList.remove('screen-enter'); document.getElementById('view-chat').classList.add('screen-exit'); 
            setTimeout(() => { document.getElementById('view-chat').classList.add('hidden'); renderInbox(true); }, 300); 
        }

        function scrollToBottom() {
            const msgArea = document.getElementById('chatMessageArea');
            msgArea.scrollTo({ top: msgArea.scrollHeight, behavior: 'smooth' });
            document.getElementById('scrollToBottomBtn').classList.add('translate-y-20', 'opacity-0');
        }

        function renderChatMessages() {
            if (isSecretChat) return; 
            const msgArea = document.getElementById('chatMessageArea'); 
            msgArea.innerHTML = ''; 
            
            const history = getChatHistory(activeChatUser);
            let lastDateStr = null;
            let lastMsgType = null;

            history.forEach(msg => {
                if(msg.deleted) return;
                
                // Date grouping
                const msgDate = new Date(parseInt(msg.id));
                const today = new Date();
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);
                
                let dateStr = msgDate.toLocaleDateString();
                let displayDate = msgDate.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
                
                if (dateStr === today.toLocaleDateString()) displayDate = "Today";
                else if (dateStr === yesterday.toLocaleDateString()) displayDate = "Yesterday";

                if (dateStr !== lastDateStr) {
                    const badge = document.createElement('div');
                    badge.className = "date-badge";
                    badge.innerText = displayDate;
                    msgArea.appendChild(badge);
                    lastDateStr = dateStr;
                    lastMsgType = null; // reset grouping after date badge
                }

                // Check grouping logic
                const isGrouped = lastMsgType === msg.type;
                appendMessageToDOM(msg, false, isGrouped);
                lastMsgType = msg.type;
            });

            scrollToBottom();
        }

        function cancelReply() { hapticFeedback(); replyingToText = null; document.getElementById('replyPreviewContainer').classList.add('hidden'); }

        function processSendText() {
            const input = document.getElementById('chatInput'); const text = input.value.trim(); if(!text) return;
            hapticFeedback(20);
            saveAndSendMsg({ id: Date.now().toString(), text: text, type: 'sent', file: null, deleted: false, status: 'sent', replyContext: replyingToText });
            input.value = ''; requestAnimationFrame(() => { input.style.height = 'auto'; document.getElementById('sendBtn').style.display = 'none'; document.getElementById('micBtn').classList.remove('hidden'); }); cancelReply();
        }

        // --- VOICE NOTE ENGINE ---
        async function toggleVoiceRecord() {
            if (!isRecording) {
                hapticFeedback();
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.start();
                    isRecording = true;
                    
                    document.getElementById('recordingUI').classList.remove('hidden');
                    document.getElementById('chatInputContainer').classList.add('hidden');
                    document.getElementById('fileUpload').previousElementSibling.classList.add('hidden');
                    
                    const micBtn = document.getElementById('micBtn');
                    micBtn.classList.replace('text-gray-300', 'text-white');
                    micBtn.classList.add('bg-blue-500');
                    micBtn.innerHTML = '<i class="fa-solid fa-paper-plane text-[20px]"></i>';
                    
                    recordStartTime = Date.now();
                    recordTimerInterval = setInterval(() => {
                        const diff = Math.floor((Date.now() - recordStartTime)/1000);
                        const m = String(Math.floor(diff/60)).padStart(2,'0');
                        const s = String(diff%60).padStart(2,'0');
                        document.getElementById('recordTimer').innerText = `${m}:${s}`;
                    }, 1000);

                    mediaRecorder.addEventListener("dataavailable", event => { audioChunks.push(event.data); });
                    mediaRecorder.addEventListener("stop", () => {
                        clearInterval(recordTimerInterval);
                        if(!cancelRecordFlag && audioChunks.length > 0) {
                            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                            const fileData = { name: "Voice Note", type: 'audio/webm', data: URL.createObjectURL(audioBlob) };
                            saveAndSendMsg({ id: Date.now().toString(), text: "", type: 'sent', file: fileData, deleted: false, status: 'sent', replyContext: replyingToText });
                        }
                        audioChunks = []; cancelRecordFlag = false;
                        stream.getTracks().forEach(t => t.stop());
                    });
                } catch(e) { alert("Microphone access needed for Voice Notes."); }
            } else {
                stopVoiceRecord(false); // Send it
            }
        }

        function stopVoiceRecord(cancel) {
            if(isRecording) {
                hapticFeedback(10);
                cancelRecordFlag = cancel;
                mediaRecorder.stop();
                isRecording = false;
                
                document.getElementById('recordingUI').classList.add('hidden');
                document.getElementById('chatInputContainer').classList.remove('hidden');
                document.getElementById('fileUpload').previousElementSibling.classList.remove('hidden');
                
                const micBtn = document.getElementById('micBtn');
                micBtn.classList.replace('text-white', 'text-gray-300');
                micBtn.classList.remove('bg-blue-500');
                micBtn.innerHTML = '<i class="fa-solid fa-microphone text-[20px]"></i>';
                document.getElementById('recordTimer').innerText = "0:00";
            }
        }

        function cancelVoiceRecord() {
            stopVoiceRecord(true);
        }

        // --- Custom Audio Player Logic ---
        let currentAudio = null;
        let currentAudioBtn = null;
        function playVoiceMessage(btn, src) {
            if(currentAudio) {
                currentAudio.pause();
                if(currentAudioBtn) currentAudioBtn.innerHTML = '<i class="fa-solid fa-play ml-0.5 text-xs"></i>';
                if(currentAudio.src.includes(src)) { currentAudio = null; return; } // Paused
            }
            currentAudio = new Audio(src);
            currentAudioBtn = btn;
            btn.innerHTML = '<i class="fa-solid fa-pause text-xs"></i>';
            
            currentAudio.play();
            const progress = btn.nextElementSibling.firstElementChild;
            currentAudio.ontimeupdate = () => {
                if(currentAudio.duration) {
                    progress.style.width = (currentAudio.currentTime / currentAudio.duration * 100) + '%';
                }
            };
            currentAudio.onended = () => {
                btn.innerHTML = '<i class="fa-solid fa-play ml-0.5 text-xs"></i>';
                progress.style.width = '0%';
                currentAudio = null;
            };
        }

        function handleFileUpload(e) { 
            const f = e.target.files[0]; if(!f) return; 
            if (f.size > 500 * 1024 * 1024) { alert("File is too large! Maximum allowed is 500MB."); return; }
            hapticFeedback();
            const msgObj = { id: Date.now().toString(), text: "", type: 'sent', file: { name: f.name, type: f.type, data: URL.createObjectURL(f) }, deleted: false, status: 'sent', replyContext: replyingToText };
            
            const history = getChatHistory(activeChatUser);
            const isGrouped = history.length > 0 && history[history.length-1].type === 'sent';

            appendMessageToDOM(msgObj, true, isGrouped); cancelReply();
            if (!isSecretChat) { addToInteractedUsers(activeChatUser); history.push({ ...msgObj, file: { name: f.name, type: f.type, data: null } }); saveChatHistory(activeChatUser, history); renderInbox(true); }
            if (globalPeer && !globalPeer.destroyed && globalPeer.open) {
                const targetPeerId = "hs_" + activeChatUser.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
                try { const conn = globalPeer.connect(targetPeerId, { reliable: true }); conn.on('open', () => { conn.send({ action: 'chat_sync', sender: myAlias, msgData: { ...msgObj, file: { name: f.name, type: f.type, data: f } }, isSecret: isSecretChat }); }); } catch(e){}
            }
            try { document.getElementById('sndPop').play().catch(()=>{}); } catch(e){}
        }

        function saveAndSendMsg(msgObj) {
            try {
                // To apply smart grouping dynamically
                const history = getChatHistory(activeChatUser);
                const isGrouped = history.length > 0 && history[history.length-1].type === msgObj.type;
                
                appendMessageToDOM(msgObj, true, isGrouped);
                
                if (!isSecretChat) { addToInteractedUsers(activeChatUser); history.push(msgObj); saveChatHistory(activeChatUser, history); renderInbox(true); }
                if (globalPeer && !globalPeer.destroyed && globalPeer.open) {
                    const targetPeerId = "hs_" + activeChatUser.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
                    try {
                        const conn = globalPeer.connect(targetPeerId, { reliable: true }); let sent = false;
                        conn.on('open', () => { conn.send({ action: 'chat_sync', sender: myAlias, msgData: msgObj, isSecret: isSecretChat }); sent = true; });
                        setTimeout(() => { if(!sent && conn.open) conn.send({ action: 'chat_sync', sender: myAlias, msgData: msgObj, isSecret: isSecretChat }); }, 500);
                    } catch(e){}
                }
                if (!isSecretChat) { fetch(SCRIPT_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: 'send_chat', sender: myAlias, receiver: activeChatUser, msgData: JSON.stringify(msgObj) }) }).catch(e => console.log("Background backup pending...")); }
                try { document.getElementById('sndPop').play().catch(()=>{}); } catch(e){}
            } catch (err) {}
        }

        function appendMessageToDOM(msgObj, animate = false, isGrouped = false) {
            const msgArea = document.getElementById('chatMessageArea'); if (!msgArea || msgObj.deleted) return; 
            const wrapper = document.createElement('div'); wrapper.id = `msg-${msgObj.id}`; wrapper.className = `flex flex-col relative ${msgObj.type === 'sent' ? 'items-end' : 'items-start'} ${animate ? 'animate-fade' : ''}`;
            
            // Only regular emojis now, jumbo logic removed
            const bubbleClass = (msgObj.type === 'sent' ? 'chat-bubble-sent' : 'chat-bubble-recv') + (isGrouped ? ' grouped' : '');
            
            const bubble = document.createElement('div'); 
            bubble.className = bubbleClass;
            
            let pressTimer;
            const handleLongPress = () => { pressTimer = setTimeout(() => { selectedMessageId = msgObj.id; selectedMessageType = msgObj.type; bubble.classList.add('bubble-active'); showContextMenu(); hapticFeedback([30, 50]); }, 400); };
            bubble.ontouchstart = handleLongPress; bubble.onmousedown = handleLongPress; bubble.ontouchend = () => clearTimeout(pressTimer); bubble.onmouseup = () => clearTimeout(pressTimer); bubble.onmouseleave = () => clearTimeout(pressTimer);

            // Swipe to reply logic
            let startX = 0;
            bubble.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive: true});
            bubble.addEventListener('touchmove', e => { 
                let diff = e.touches[0].clientX - startX;
                if(diff > 40) { bubble.style.transform = 'translateX(20px)'; }
            }, {passive: true});
            bubble.addEventListener('touchend', e => {
                if(bubble.style.transform !== '') {
                    bubble.style.transform = '';
                    hapticFeedback(20);
                    selectedMessageId = msgObj.id;
                    handleMenuAction('reply');
                }
            });

            let tapCount = 0; let tapTimer;
            bubble.addEventListener('click', (e) => {
                tapCount++;
                if(tapCount === 1) tapTimer = setTimeout(() => { tapCount = 0; }, 300);
                else if (tapCount === 2) { 
                    clearTimeout(tapTimer); tapCount = 0; selectedMessageId = msgObj.id; handleReaction('❤️'); 
                    bubble.classList.add('pulse-anim'); setTimeout(()=>bubble.classList.remove('pulse-anim'), 300);
                    showHeartExplosion(e.clientX, e.clientY);
                }
            });

            if (msgObj.replyContext) { const replyDiv = document.createElement('div'); replyDiv.className = 'bg-black/20 border-l-[3px] border-white/40 px-2 py-1 mb-1 rounded-[4px] text-[10px] opacity-80 truncate max-w-[200px] pointer-events-none'; replyDiv.innerText = msgObj.replyContext; bubble.appendChild(replyDiv); }
            
            if (msgObj.file) {
                if(msgObj.file.type.startsWith('audio/')) {
                    bubble.innerHTML += `
                        <div class="flex items-center gap-2 bg-black/20 p-2 rounded-[16px] w-[180px]">
                            <button class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white shrink-0 active:scale-90" onclick="playVoiceMessage(this, '${msgObj.file.data}')">
                                <i class="fa-solid fa-play ml-0.5 text-xs"></i>
                            </button>
                            <div class="flex-1 h-1.5 bg-gray-600 rounded-full overflow-hidden relative"><div class="absolute left-0 top-0 bottom-0 bg-white w-0 transition-all duration-100 playback-progress"></div></div>
                        </div>`;
                } else if (!msgObj.file.data) {
                    bubble.innerHTML += `<div class="flex items-center gap-3 bg-black/20 p-2 rounded-xl border border-white/10 pointer-events-none"><i class="fa-solid fa-file-arrow-down text-2xl text-blue-300"></i> <div class="truncate text-[12px] max-w-[150px] font-semibold">${msgObj.file.name}<br><span class="text-[9px] text-gray-400">File session ended</span></div></div>`;
                } else if (msgObj.file.type.startsWith('image/')) {
                    bubble.innerHTML += `<img src="${msgObj.file.data}" class="rounded-xl max-w-[200px] max-h-[250px] object-cover bg-black/20 cursor-pointer hover:opacity-90 transition" onclick="openLightbox('${msgObj.file.data}')">`;
                } else {
                    bubble.innerHTML += `<div class="flex items-center gap-3 bg-black/20 p-2 rounded-xl border border-white/10 pointer-events-none"><i class="fa-solid fa-file-lines text-2xl text-blue-300"></i> <div class="truncate text-[12px] max-w-[150px] font-semibold">${msgObj.file.name}</div></div>`;
                }
            } else { 
                let formattedText = (msgObj.text || "").replace(/\n/g, '<br>');
                // Re-apply mention styling securely for display
                formattedText = formattedText.replace(/(@\w+)/g, '<span class="mention-tag">$1</span>');
                const textSpan = document.createElement('span'); 
                textSpan.innerHTML = formattedText; 
                textSpan.className = "pointer-events-none"; 
                bubble.appendChild(textSpan); 
            }
            
            if (msgObj.reaction) { 
                const reactDiv = document.createElement('div'); 
                reactDiv.className = 'reaction-badge'; 
                reactDiv.innerText = msgObj.reaction; 
                reactDiv.onclick = (e) => { e.stopPropagation(); selectedMessageId = msgObj.id; handleReaction(''); }; 
                bubble.appendChild(reactDiv); 
            }

            let timeString = "", statusIcon = "";
            if (msgObj.id) timeString = new Date(parseInt(msgObj.id)).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            if (msgObj.type === 'sent') {
                if (msgObj.status === 'read') statusIcon = `<i class="fa-solid fa-check-double text-blue-400 ml-1 text-[9px] status-icon"></i>`;
                else if (msgObj.status === 'delivered') statusIcon = `<i class="fa-solid fa-check-double text-gray-400 ml-1 text-[9px] status-icon"></i>`;
                else statusIcon = `<i class="fa-solid fa-check text-gray-400 ml-1 text-[9px] status-icon"></i>`;
            }

            wrapper.appendChild(bubble);
            
            const metaEl = document.createElement('div'); metaEl.className = `text-[8px] text-gray-500 mt-0.5 px-1 flex items-center ${msgObj.type === 'sent' ? 'justify-end' : 'justify-start'} ${isGrouped ? 'hidden' : ''}`; metaEl.innerHTML = `<span>${timeString}</span>${statusIcon}`; wrapper.appendChild(metaEl);
            
            if (isGrouped && msgArea.lastChild && msgArea.lastChild.id !== 'typing-bubble') {
                const lastMeta = msgArea.lastChild.querySelector('.text-\\[8px\\]');
                if(lastMeta) lastMeta.classList.add('hidden');
            }

            // Insert before typing bubble if exists
            const typingBubble = document.getElementById('typing-bubble');
            if(typingBubble) msgArea.insertBefore(wrapper, typingBubble);
            else msgArea.appendChild(wrapper); 
            
            if(animate) { setTimeout(scrollToBottom, 50); }
        }

        function showContextMenu() {
            const dynamicBtnContainer = document.getElementById('menuDynamicBtnContainer');
            if (selectedMessageType === 'sent') dynamicBtnContainer.innerHTML = `<div class="flex items-center gap-4 px-5 py-3 hover:bg-[#3a3a3c] transition cursor-pointer text-[14px] font-medium text-red-500" onclick="unsendMessage()"><i class="fa-regular fa-trash-can text-[16px] w-5 text-center"></i> Unsend</div>`;
            else dynamicBtnContainer.innerHTML = `<div class="flex items-center gap-4 px-5 py-3 hover:bg-[#3a3a3c] transition cursor-pointer text-[14px] font-medium text-red-500" onclick="handleMenuAction('report')"><i class="fa-solid fa-triangle-exclamation text-[16px] w-5 text-center"></i> Report</div>`;
            
            const history = getChatHistory(activeChatUser);
            const msg = history.find(m => m.id === selectedMessageId);
            const reactContainer = document.getElementById('menuReactionRemoveContainer');
            if (msg && msg.reaction) {
                reactContainer.innerHTML = `<div class="flex items-center gap-4 px-5 py-3 hover:bg-[#3a3a3c] transition cursor-pointer text-[14px] font-medium text-yellow-500 border-t border-gray-800/60" onclick="handleReaction('')"><i class="fa-solid fa-face-frown-open text-[16px] w-5 text-center"></i> Remove Reaction</div>`;
            } else {
                reactContainer.innerHTML = '';
            }

            document.getElementById('emojiPickerGrid').classList.add('hidden'); document.getElementById('emojiPickerGrid').classList.remove('grid');
            document.getElementById('menuOptionsList').classList.remove('hidden');
            const overlay = document.getElementById('contextMenuOverlay'); const sheet = document.getElementById('contextMenuSheet');
            overlay.classList.remove('hidden'); overlay.classList.add('flex'); setTimeout(() => { overlay.classList.remove('opacity-0'); sheet.classList.remove('translate-y-full'); }, 10);
